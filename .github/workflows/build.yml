name: Build

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions: read-all

jobs:
  ci:
    # Reusable CI lives in 1set/meta — the single source of truth for every
    # Star* module's pipeline. Pinned to a commit SHA for supply-chain safety;
    # bump the pin when meta's workflow changes (Dependabot github-actions can
    # automate this).
    uses: 1set/meta/.github/workflows/go-ci.yml@5d86667e7264f012655dab2644dfa44e09597445
    with:
      # starbox's current go.mod floor; the A1 pin PR (go.starlark/starlight/
      # starlet upgrade) flips this to "1.19" in the same PR that raises it.
      go-floor: "1.18"
      # Test-coverage ratchet (covcheck). Current total is ~99.2%; this floor
      # is intentionally conservative and can be tightened once CI reports the
      # first authoritative number. starbox is a host-runtime library, not a
      # script-builtin domain module, so doc-coverage and footprint stay off.
      cov-min: 95
    secrets: inherit
